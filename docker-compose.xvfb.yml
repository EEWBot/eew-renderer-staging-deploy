services:
  xvfb:
    build: ./xvfb
    hostname: xvfb
    container_name: eewrendererstg${VARIANT:-}__xvfb
    restart: unless-stopped

    command: Xvfb :0 -listen tcp -ac -screen 0 1024x768x24

    tmpfs:
      - /tmp

    deploy:
      resources:
        limits:
          memory: 128m

    networks:
      - default

  eewrendererstg:
    image: ghcr.io/eewbot/eew-renderer:master@sha256:3652f04b559f80e7e4b17f03ea1038f7ffef5083ad2d121c6762010bf1da0c99
    hostname: eewrenderer
    container_name: eewrendererstg${VARIANT:-}__eewrendererstg
    restart: unless-stopped

    environment:
      LISTEN: 0.0.0.0:3000
      DISPLAY: xvfb:0
      ALLOW_DEMO: ${ALLOW_DEMO}
      HMAC_KEY: ${HMAC_KEY}
      INSTANCE_NAME: ${INSTANCE_NAME}
      MINIMUM_RESPONSE_INTERVAL: ${MINIMUM_RESPONSE_INTERVAL}

    command: /usr/bin/eew-renderer

    deploy:
      resources:
        limits:
          memory: 2g

    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    hostname: cloudflared
    container_name: eewrendererstg${VARIANT:-}__cloudflared

    restart: unless-stopped

    environment:
      TUNNEL_LOGFILE: /dev/stdout

    command: tunnel run --token ${TUNNEL_TOKEN}
    user: root

    deploy:
      resources:
        limits:
          memory: 128m

    networks:
      - default

networks:
  default:
    name: eewrendererstg${VARIANT:-}__default
