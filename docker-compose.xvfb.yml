services:
  xvfb:
    build: ./xvfb
    hostname: xvfb
    container_name: eewrendererstg${VARIANT:-}__xvfb
    restart: unless-stopped

    command: Xvfb :0 -listen tcp -ac -screen 0 1024x768x24

    tmpfs:
      - /tmp

    deploy:
      resources:
        limits:
          memory: 128m

    networks:
      - default

  eewrendererstg:
    image: ghcr.io/eewbot/eew-renderer:master@sha256:4124481b9487c1d8e7803f04e7876057f3ea866c7a502169d8b60554dd937b2c
    hostname: eewrenderer
    container_name: eewrendererstg${VARIANT:-}__eewrendererstg
    restart: unless-stopped

    environment:
      LISTEN: 0.0.0.0:3000
      DISPLAY: xvfb:0
      ALLOW_DEMO: ${ALLOW_DEMO}
      HMAC_KEY: ${HMAC_KEY}
      INSTANCE_NAME: ${INSTANCE_NAME}
      MINIMUM_RESPONSE_INTERVAL: ${MINIMUM_RESPONSE_INTERVAL}

    command: /usr/bin/eew-renderer

    deploy:
      resources:
        limits:
          memory: 2g

    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    hostname: cloudflared
    container_name: eewrendererstg${VARIANT:-}__cloudflared

    restart: unless-stopped

    environment:
      TUNNEL_LOGFILE: /dev/stdout

    command: tunnel run --token ${TUNNEL_TOKEN}
    user: root

    deploy:
      resources:
        limits:
          memory: 128m

    networks:
      - default

networks:
  default:
    name: eewrendererstg${VARIANT:-}__default
