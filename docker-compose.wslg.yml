services:
  eewrendererstg:
    image: ghcr.io/eewbot/eew-renderer:master@sha256:c39616021e59ea9aed807a2169d445b9320453fc94caca605111ece7e3348fcd
    hostname: eewrenderer
    container_name: eewrendererstg${VARIANT:-}__eewrendererstg
    restart: unless-stopped

    environment:
      LISTEN: 0.0.0.0:3000
      HMAC_KEY: ${HMAC_KEY}
      INSTANCE_NAME: ${INSTANCE_NAME}
      ALLOW_DEMO: ${ALLOW_DEMO}
      DISPLAY: ${DISPLAY}
      MINIMUM_RESPONSE_INTERVAL: ${MINIMUM_RESPONSE_INTERVAL}
      LD_LIBRARY_PATH: /usr/lib/wsl/lib

    volumes:
      - type: bind
        source: /tmp/.X11-unix
        target: /tmp/.X11-unix

      - type: bind
        source: /usr/lib/wsl
        target: /usr/lib/wsl

    devices:
      - /dev/dxg

    command: /usr/bin/eew-renderer

    deploy:
      resources:
        limits:
          memory: 2g

    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:2026.7.3
    hostname: cloudflared
    container_name: eewrendererstg${VARIANT:-}__cloudflared

    restart: unless-stopped

    environment:
      TUNNEL_LOGFILE: /dev/stdout

    command: tunnel run --token ${TUNNEL_TOKEN}
    user: root

    deploy:
      resources:
        limits:
          memory: 128m

    networks:
      - default

networks:
  default:
    name: eewrendererstg${VARIANT:-}__default
